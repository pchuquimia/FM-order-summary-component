<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Frontend Mentor | Order summary card</title>
  </head>
  <body>
    <main class="main">
      <div class="card">
        <img src="./images/illustration-hero.svg" alt="" />
        <div class="content flex-grid">
          <h1 class="title">Order Summary</h1>
          <p class="description">
            You can now listen to millions of songs, audiobooks, and podcasts on
            any device anywhere you like!
          </p>

          <div class="suscription">
            <div class="anual--plan">
              <img src="./images/icon-music.svg" alt="" />
              <div class="plan">
                <p class="annual-plan">Annual Plan</p>
                <p class="price">$59.99/year</p>
              </div>
            </div>
            <div>
              <a class="change" href="#">Change</a>
            </div>
          </div>

          <button class="button--payment">Proceed to Payment</button>
          <button class="button-cancel">Cancel Order</button>
        </div>
      </div>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>
  </body>
</html>
